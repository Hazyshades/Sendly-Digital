<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#6366f1"/>
    </marker>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="#f8fafc" rx="8"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Verification methodology</text>
  <!-- Step 1 -->
  <rect x="20" y="42" width="100" height="56" rx="6" fill="url(#boxGrad)" stroke="#4f46e5" stroke-width="1"/>
  <text x="70" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white">1. Privy consistency</text>
  <text x="70" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">linked accounts, wallet schema</text>
  <!-- Arrow 1→2 -->
  <line x1="122" y1="70" x2="158" y2="70" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 2 -->
  <rect x="162" y="42" width="100" height="56" rx="6" fill="url(#boxGrad)" stroke="#4f46e5" stroke-width="1"/>
  <text x="212" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white">2. On-chain reconciliation</text>
  <text x="212" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">cards, txs, index/subgraph</text>
  <!-- Arrow 2→3 -->
  <line x1="264" y1="70" x2="300" y2="70" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 3 -->
  <rect x="304" y="42" width="76" height="56" rx="6" fill="url(#boxGrad)" stroke="#4f46e5" stroke-width="1"/>
  <text x="342" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white">3. OAuth checks</text>
  <text x="342" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">provider API spot checks</text>
  <!-- Arrow down to 4 -->
  <line x1="212" y1="102" x2="212" y2="128" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 4 -->
  <rect x="82" y="132" width="236" height="52" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="200" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#3730a3">4. Logging &amp; metrics</text>
  <text x="200" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4f46e5">discrepancies, quality metrics, manual review</text>
</svg>
